services:
  db:
    image: postgres:15-alpine
    container_name: MyEbookspostgres
    restart: always
    environment:
      POSTGRES_USER: adminEbooks
      POSTGRES_PASSWORD: password_segura_local
      POSTGRES_DB: myebooks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: myebooks_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: